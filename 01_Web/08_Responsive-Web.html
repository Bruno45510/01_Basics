<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        background-color: red;
        width: 33%;
        height: 100px;
        padding: 10px;
        margin-left: 10px;
    }

    .wrapper {
        display: flex;
    }

    @media (min-width: 308px) {
        .box {

            background-color: green;
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-left: 10px;
        }

        .wrapper {
            display: grid;
        }

    }
</style>

<body>

    <div class="wrapper">
        <div class="box">eins</div>
        <div class="box">zwei</div>
        <div class="box">drei</div>
        <div class="box">vier</div>
    </div>

</body>

</html>
